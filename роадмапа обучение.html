<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roadmap Data Scientist — интерактивный</title>
    <style>
        :root {
            --bg-1: #1c1406;
            --bg-2: #3a2a10;
            --surface: #241a08;
            --card: #2d210c;
            --text-main: #e9cf72;
            --text-muted: #c9ad55;
            --amber-1: #e2c05a;
            --amber-2: #d6ac3d;
            --amber-3: #f0d57f;
            --completed: #b38d2b;
            --progress: #8d6a16;
            --pending: #5d4b21;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(180deg, #1a1205 0%, var(--bg-1) 50%, #100b03 100%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid #7d6322;
            padding: 30px;
            box-shadow: 0 25px 80px rgba(0,0,0,.45);
        }
        h1 { text-align: center; color: var(--amber-1); margin-bottom: 8px; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 24px; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
        .stat-box {
            background: #33260e;
            color: var(--amber-3); padding: 16px; text-align: center; border: 1px solid #8f6f27;
        }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-label { font-size: .9rem; opacity: .9; }

        .progress-section {
            background: #33260e;
            color: var(--amber-3); padding: 18px; margin-bottom: 30px; border: 1px solid #8f6f27;
        }
        .progress-bar { margin-top: 10px; background: #1f1607; height: 34px; overflow: hidden; border: 1px solid #8f6f27; }
        .progress-fill {
            height: 100%; width: 0; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(90deg, #8f6e1e, var(--amber-2)); color: #1a1205; font-weight: 700;
            transition: width .35s ease;
        }

        .roadmap-container { display: flex; flex-direction: column; gap: 28px; position: relative; padding: 10px 0; }
        .roadmap-container::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 2px;
            background: #a8842d;
            transform: translateX(-50%);
        }
        .stage { display: flex; position: relative; }
        .stage.left { justify-content: flex-start; }
        .stage.right { justify-content: flex-end; }
        .stage-content {
            width: min(520px, 94%);
            background: var(--card);
            border: 1px solid #9d7d2f;
            padding: 18px 18px 16px 18px;
            position: relative;
            cursor: pointer;
            transition: transform .5s ease, opacity .5s ease, box-shadow .25s;
            box-shadow: 0 10px 25px rgba(44, 28, 11, .15);
        }
        .stage-content.reveal {
            opacity: 0;
            transform: translateY(40px);
        }
        .stage-content.reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .stage-content:hover { transform: translateY(-4px); box-shadow: 0 14px 30px rgba(44,28,11,.23); }
        .stage-content.completed { border-color: #b89332; background: #35280f; }
        .stage-content.in-progress { border-color: #d0a63a; background: #3a2b10; }

        .stage-number {
            position: absolute; top: -12px; left: -12px; width: 34px; height: 34px;
            background: #8e6e20; color: #1a1205; font-weight: 700;
            display: flex; align-items: center; justify-content: center; border: 2px solid #f7e9cf;
            box-shadow: 0 5px 14px rgba(93,58,20,.45);
        }

        .snake-link {
            position: absolute; top: 50%; width: 90px; height: 2px; background: #a8842d;
        }
        .stage.left .snake-link { right: -90px; }
        .stage.right .snake-link { left: -90px; }

        .stage-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; color: var(--amber-3); }
        .stage-time { display: inline-block; background: #8f6e1e; color: #1b1305; padding: 4px 12px; font-size: .85rem; margin-bottom: 8px; }
        .stage-desc { color: var(--text-muted); line-height: 1.45; }
        .stage-icon { font-size: 1.8rem; margin-bottom: 6px; }

        .status-badge { position: absolute; top: 10px; right: 10px; font-size: .78rem; font-weight: 700; padding: 5px 10px; }
        .status-badge.completed { background: #b89332; color: #1a1205; }
        .status-badge.in-progress { background: #d0a63a; color: #1a1205; }
        .status-badge.pending { background: var(--pending); color: var(--amber-3); }

        .controls { text-align: center; margin-top: 28px; }
        .btn-control, .btn {
            border: 1px solid #8f6f27; padding: 11px 22px; cursor: pointer; font-weight: 700;
        }
        .btn-control { margin: 0 6px; background: #3a2b10; color: var(--amber-3); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.74); align-items: center; justify-content: center; }
        .modal-content { width: min(760px, 92%); max-height: 85vh; overflow: auto; background: #2d210c; border: 1px solid #8f6f27; padding: 28px; position: relative; }
        .modal-close { position: absolute; top: 14px; right: 14px; width: 34px; height: 34px; border: 1px solid #8f6f27; background: #3a2b10; color: var(--amber-3); cursor: pointer; }
        .modal-title { color: var(--amber-1); margin-bottom: 14px; }
        .modal-section { margin-bottom: 14px; }
        .modal-section h3 { color: var(--amber-2); margin-bottom: 6px; }

        .btn-pending { background: #5d4b21; color: var(--amber-3); }
        .btn-progress { background: #a8842d; color: #1a1205; }
        .btn-completed { background: #caa23b; color: #1a1205; }

        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .stage.left, .stage.right { justify-content: center; }
            .snake-link { display: none; }
            .stage-content { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧭 Roadmap профессии Data Scientist</h1>
    <p class="subtitle">Пошаговый интерактивный план развития: от базы до прикладной аналитики</p>

    <div class="stats-grid">
        <div class="stat-box"><div class="stat-value" id="totalSkills">0</div><div class="stat-label">Всего этапов</div></div>
        <div class="stat-box"><div class="stat-value" id="completedCount">0</div><div class="stat-label">Пройдено</div></div>
        <div class="stat-box"><div class="stat-value" id="progressCount">0</div><div class="stat-label">В работе</div></div>
        <div class="stat-box"><div class="stat-value" id="currentLevel">Старт</div><div class="stat-label">Текущий уровень</div></div>
    </div>
    <div class="progress-section">
        <div>Общий прогресс обучения</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill">0%</div></div>
    </div>
    <div class="roadmap-container" id="roadmapStages"></div>
    <div class="controls">
        <button class="btn-control" onclick="saveData()">Сохранить</button>
        <button class="btn-control" onclick="loadData()">Загрузить</button>
        <button class="btn-control" onclick="resetData()">Сбросить</button>
    </div>

    
<div class="modal" id="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">×</button>
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-section"><h3>Описание</h3><p id="modalDesc"></p></div>
        <div class="modal-section"><h3>Что изучить</h3><ul id="modalDetails"></ul></div>
        <div class="modal-section"><h3>Рекомендуемое время</h3><p id="modalTime"></p></div>
        <div class="modal-section"><h3>Полезные ресурсы</h3><ul id="modalResources"></ul></div>
        <div class="btn-group">
            <button class="btn btn-pending" onclick="setStatus('pending')">⏳ Не начато</button>
            <button class="btn btn-progress" onclick="setStatus('in-progress')">🔄 В процессе</button>
            <button class="btn btn-completed" onclick="setStatus('completed')">✅ Пройдено</button>
        </div>
    </div>
</div>

<script>
const roadmapData = [
{id:1,title:"Статистика",icon:"📐",time:"2–4 недели",description:"Базовая вероятностная и описательная статистика для анализа данных.",details:["Распределения и их параметры","Средние, медиана, дисперсия","Доверительные интервалы","Корреляция и причинность"],resources:["Khan Academy","OpenIntro Statistics","Статьи на Хабре"]},
{id:2,title:"SQL",icon:"🗃️",time:"2–3 недели",description:"Уверенная работа с выборками, объединениями и аналитическими запросами.",details:["JOIN и подзапросы","Оконные функции","Агрегации и группировки","Оптимизация запросов"],resources:["SQLBolt","Mode SQL Tutorial","PostgreSQL docs"]},
{id:3,title:"Pandas & NumPy",icon:"🐼",time:"3–4 недели",description:"Практика обработки данных и вычислений в Python.",details:["Индексация и фильтрация","Сводные таблицы","Работа с пропусками","Векторизация вычислений"],resources:["Документация pandas","NumPy User Guide","Kaggle Learn"]},
{id:4,title:"Очистка данных и EDA",icon:"🧹",time:"3 недели",description:"Системная подготовка данных и первичный исследовательский анализ.",details:["Проверка качества данных","Аномалии и выбросы","Построение гипотез","Профилирование датасета"],resources:["YData profiling","Статьи Towards Data Science"]},
{id:5,title:"Визуализация и сторителлинг",icon:"📊",time:"2–3 недели",description:"Подача выводов через графики и убедительные бизнес-истории.",details:["Matplotlib / Seaborn","Графики для разных задач","Дашборд-мышление","Презентация выводов"],resources:["Storytelling with Data","Seaborn docs"]},
{id:6,title:"Проверка гипотез и A/B-тесты",icon:"🧪",time:"3 недели",description:"Статистическая проверка изменений в продукте и маркетинге.",details:["p-value и ошибки I/II рода","t-test, chi-square","Дизайн эксперимента","Оценка эффекта"],resources:["StatQuest","Evan Miller A/B guides"]},
{id:7,title:"Машинное обучение для анализа данных",icon:"🤖",time:"4–6 недель",description:"Практика базовых моделей для прогноза и сегментации.",details:["Линейные модели","Деревья и бустинг","Кросс-валидация","Выбор метрик"],resources:["scikit-learn docs","Hands-On ML"]},
{id:8,title:"Подготовка портфолио и кейсов",icon:"🧳",time:"2–4 недели",description:"Сбор проектов, которые показывают процесс мышления и результат.",details:["Оформление репозитория","Описание бизнес-контекста","Визуальное резюме кейса","Публичная презентация"],resources:["GitHub","Notion","Kaggle"]},
{id:9,title:"Продуктовая аналитика",icon:"📈",time:"3–5 недель",description:"Работа с метриками продукта и воронками для принятия решений.",details:["North Star Metric","Retention и когорты","Фаннелы и сегменты","Unit-экономика"],resources:["Reforge essays","Amplitude blog"]},
{id:10,title:"Модели и интерпретация результатов",icon:"🔍",time:"3 недели",description:"Объяснимость моделей и перевод технических результатов в бизнес-решения.",details:["Feature importance","SHAP на практике","Ограничения модели","Рекомендации для стейкхолдеров"],resources:["Interpretable ML Book","SHAP docs"]}
];

let currentStage = null;
let progress = {1:'completed',2:'completed',3:'completed'};
const STORAGE_KEY = 'dsRoadmapProgress';

function renderRoadmap(){
  const container=document.getElementById('roadmapStages'); container.innerHTML='';
  const statusText={pending:'Не начато','in-progress':'В процессе',completed:'Пройдено'};
  roadmapData.forEach((stage,idx)=>{
    const status=progress[stage.id]||'pending';
    const side=idx%2===0?'left':'right';
    const el=document.createElement('div');
    el.className=`stage ${side}`;
    el.id=`stage-${stage.id}`;
    el.innerHTML=`<div class="stage-content ${status}" onclick="openModal(${stage.id})">
      <div class="stage-number">${stage.id}</div>
      <div class="snake-link"></div>
      <span class="status-badge ${status}">${statusText[status]}</span>
      <div class="stage-icon">${stage.icon}</div>
      <div class="stage-title">${stage.title}</div>
      <div class="stage-time">${stage.time}</div>
      <div class="stage-desc">${stage.description}</div>
    </div>`;
    container.appendChild(el);
  });
  initScrollReveal();
  updateStats();
}
function initScrollReveal(){
  const cards=document.querySelectorAll('.stage-content');
  cards.forEach(card=>card.classList.add('reveal'));
  const observer=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  },{threshold:0.25, rootMargin:'0px 0px -10% 0px'});
  cards.forEach(card=>observer.observe(card));
}
function openModal(id){
  currentStage=roadmapData.find(s=>s.id===id); if(!currentStage)return;
  modalTitle.textContent=`${currentStage.icon} ${currentStage.title}`;
  modalDesc.textContent=currentStage.description;
  modalTime.textContent=currentStage.time;
  modalDetails.innerHTML=currentStage.details.map(d=>`<li>${d}</li>`).join('');
  modalResources.innerHTML=currentStage.resources.map(r=>`<li>${r}</li>`).join('');
  modal.style.display='flex';
}
function closeModal(){ modal.style.display='none'; currentStage=null; }
function setStatus(status){
  if(!currentStage) return;
  progress[currentStage.id]=status;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(progress));
  renderRoadmap(); closeModal();
}
function updateStats(){
  const total=roadmapData.length;
  const completed=Object.values(progress).filter(s=>s==='completed').length;
  const inProgress=Object.values(progress).filter(s=>s==='in-progress').length;
  const percent=Math.round(((completed+inProgress*0.5)/total)*100);
  totalSkills.textContent=total; completedCount.textContent=completed; progressCount.textContent=inProgress;
  progressFill.style.width=percent+'%'; progressFill.textContent=percent+'%';
  let level='Старт'; if(completed>=9)level='Продвинутый'; else if(completed>=7)level='Уверенный'; else if(completed>=4)level='Практик'; else if(completed>=1)level='Начинающий';
  currentLevel.textContent=level;
}
function saveData(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(progress)); alert('✅ Прогресс сохранён'); }
function loadData(){
  const saved=localStorage.getItem(STORAGE_KEY);
  if(saved){ progress=JSON.parse(saved); renderRoadmap(); alert('✅ Прогресс загружен'); }
  else { alert('ℹ️ Сохранённых данных пока нет'); }
}
function resetData(){
  if(confirm('⚠️ Сбросить весь прогресс?')){ progress={1:'completed',2:'completed',3:'completed'}; localStorage.removeItem(STORAGE_KEY); renderRoadmap(); alert('🔄 Прогресс сброшен'); }
}
modal.addEventListener('click',function(e){ if(e.target===this) closeModal(); });
window.onload=()=>{ const saved=localStorage.getItem(STORAGE_KEY); if(saved) progress=JSON.parse(saved); renderRoadmap(); };
</script>
</body>
</html>
