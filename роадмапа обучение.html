<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Роадмап системного аналитика — интерактивный</title>
    <style>
        :root {
            --bg-1: #fff6fb;
            --bg-2: #ffe9f6;
            --surface: #ffffff;
            --card: #fff9fd;
            --text-main: #46233a;
            --text-muted: #7b4b67;
            --accent-1: #ff5fae;
            --accent-2: #f5429f;
            --accent-3: #ffd0e9;
            --line: #f4b4d8;
            --completed: #ff5fae;
            --progress: #ff89c0;
            --pending: #f3d6e7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid #ffd8ec;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 22px 65px rgba(255, 95, 174, .14);
        }
        h1 { text-align: center; color: var(--accent-2); margin-bottom: 8px; }
        .subtitle { text-align: center; color: var(--text-muted); margin-bottom: 24px; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
        .stat-box {
            background: #fff7fc;
            color: var(--text-main); padding: 16px; text-align: center; border: 1px solid #ffd7eb;
            border-radius: 20px;
        }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent-2); }
        .stat-label { font-size: .9rem; opacity: .9; }

        .progress-section {
            background: #fff7fc;
            color: var(--text-main); padding: 18px; margin-bottom: 30px; border: 1px solid #ffd7eb;
            border-radius: 22px;
        }
        .progress-bar { margin-top: 10px; background: #ffe7f4; height: 34px; overflow: hidden; border: 1px solid #ffcce5; border-radius: 999px; }
        .progress-fill {
            height: 100%; width: 0; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(90deg, var(--progress), var(--accent-2)); color: #ffffff; font-weight: 700;
            transition: width .35s ease;
            border-radius: 999px;
        }

        .roadmap-container { display: flex; flex-direction: column; gap: 28px; position: relative; padding: 10px 0; }
        .roadmap-container::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 3px;
            background: linear-gradient(var(--line), #ffc4e4);
            transform: translateX(-50%);
            border-radius: 999px;
        }
        .stage { display: flex; position: relative; }
        .stage.left { justify-content: flex-start; }
        .stage.right { justify-content: flex-end; }
        .stage-content {
            width: min(520px, 94%);
            background: var(--card);
            border: 1px solid #ffd2e9;
            border-radius: 24px;
            padding: 20px 20px 18px;
            position: relative;
            cursor: pointer;
            transition: transform .45s ease, opacity .45s ease, box-shadow .25s;
            box-shadow: 0 12px 30px rgba(245, 66, 159, .08);
        }
        .stage-content.reveal { opacity: 0; transform: translateY(40px); }
        .stage-content.reveal.visible { opacity: 1; transform: translateY(0); }
        .stage-content:hover { transform: translateY(-4px); box-shadow: 0 18px 35px rgba(245,66,159,.16); }
        .stage-content.completed { border-color: #ff8ec6; background: #fff2fa; }
        .stage-content.in-progress { border-color: #ffb3da; background: #fff6fc; }

        .stage-number {
            position: absolute; top: -12px; left: -12px; width: 36px; height: 36px;
            background: var(--accent-2); color: #fff; font-weight: 700;
            display: flex; align-items: center; justify-content: center; border: 2px solid #fff;
            border-radius: 999px;
            box-shadow: 0 8px 16px rgba(245,66,159,.3);
        }

        .snake-link { position: absolute; top: 50%; width: 90px; height: 3px; background: var(--line); border-radius: 999px; }
        .stage.left .snake-link { right: -90px; }
        .stage.right .snake-link { left: -90px; }

        .stage-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; color: var(--accent-2); }
        .stage-time { display: inline-block; background: #ffe4f4; color: #8e2d66; padding: 5px 12px; font-size: .85rem; margin-bottom: 8px; border-radius: 999px; }
        .stage-desc { color: var(--text-muted); line-height: 1.45; }
        .stage-icon { font-size: 1.8rem; margin-bottom: 6px; }

        .status-badge { position: absolute; top: 12px; right: 12px; font-size: .78rem; font-weight: 700; padding: 6px 10px; border-radius: 999px; }
        .status-badge.completed { background: #ff5fae; color: #fff; }
        .status-badge.in-progress { background: #ff9dce; color: #fff; }
        .status-badge.pending { background: var(--pending); color: #7a4262; }

        .controls { text-align: center; margin-top: 28px; }
        .btn-control, .btn { border: 1px solid #ffc9e6; padding: 11px 22px; cursor: pointer; font-weight: 700; border-radius: 14px; }
        .btn-control { margin: 0 6px; background: #fff1f9; color: #8e2d66; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(66, 18, 48, .45); align-items: center; justify-content: center; }
        .modal-content { width: min(760px, 92%); max-height: 85vh; overflow: auto; background: #fff9fd; border: 1px solid #ffc9e6; padding: 28px; position: relative; border-radius: 24px; }
        .modal-close { position: absolute; top: 14px; right: 14px; width: 36px; height: 36px; border: 1px solid #ffc9e6; background: #fff1f9; color: #9a356d; cursor: pointer; border-radius: 12px; }
        .modal-title { color: var(--accent-2); margin-bottom: 14px; }
        .modal-section { margin-bottom: 14px; }
        .modal-section h3 { color: #c53a86; margin-bottom: 6px; }

        .btn-pending { background: #f3d6e7; color: #7a4262; }
        .btn-progress { background: #ff9dce; color: #fff; }
        .btn-completed { background: #ff5fae; color: #fff; }

        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .stage.left, .stage.right { justify-content: center; }
            .snake-link { display: none; }
            .stage-content { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧭 Роадмап профессии системный аналитик</h1>
    <p class="subtitle">Пошаговый интерактивный план развития: от базовых навыков до зрелой системной аналитики</p>

    <div class="stats-grid">
        <div class="stat-box"><div class="stat-value" id="totalSkills">0</div><div class="stat-label">Всего этапов</div></div>
        <div class="stat-box"><div class="stat-value" id="completedCount">0</div><div class="stat-label">Пройдено</div></div>
        <div class="stat-box"><div class="stat-value" id="progressCount">0</div><div class="stat-label">В работе</div></div>
        <div class="stat-box"><div class="stat-value" id="currentLevel">Старт</div><div class="stat-label">Текущий уровень</div></div>
    </div>
    <div class="progress-section">
        <div>Общий прогресс обучения</div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill">0%</div></div>
    </div>
    <div class="roadmap-container" id="roadmapStages"></div>
    <div class="controls">
        <button class="btn-control" onclick="saveData()">Сохранить</button>
        <button class="btn-control" onclick="loadData()">Загрузить</button>
        <button class="btn-control" onclick="resetData()">Сбросить</button>
    </div>

<div class="modal" id="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()">×</button>
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-section"><h3>Описание</h3><p id="modalDesc"></p></div>
        <div class="modal-section"><h3>Что изучить</h3><ul id="modalDetails"></ul></div>
        <div class="modal-section"><h3>Рекомендуемое время</h3><p id="modalTime"></p></div>
        <div class="modal-section"><h3>Полезные ресурсы</h3><ul id="modalResources"></ul></div>
        <div class="btn-group">
            <button class="btn btn-pending" onclick="setStatus('pending')">⏳ Не начато</button>
            <button class="btn btn-progress" onclick="setStatus('in-progress')">🔄 В процессе</button>
            <button class="btn btn-completed" onclick="setStatus('completed')">✅ Пройдено</button>
        </div>
    </div>
</div>

<script>
const roadmapData = [
{id:1,title:"Роль системного аналитика и SDLC",icon:"🧩",time:"1–2 недели",description:"Понимание задач системного аналитика, жизненного цикла разработки и роли в команде.",details:["Роли в продуктовой и проектной командах","Waterfall, Agile, Scrum, Kanban","Артефакты анализа на этапах SDLC","Зоны ответственности аналитика"],resources:["BABOK Guide","PMBOK (обзор)","Scrum Guide на русском"]},
{id:2,title:"Сбор и выявление требований",icon:"🗣️",time:"2–3 недели",description:"Методы выявления требований и работа со стейкхолдерами.",details:["Интервью, воркшопы, фасилитация","Stakeholder map и управление ожиданиями","Функциональные и нефункциональные требования","Техники уточнения и приоритизации"],resources:["Karl Wiegers — Software Requirements","BABOK: Elicitation and Collaboration","Шаблоны BRD/vision"]},
{id:3,title:"Документирование требований",icon:"📝",time:"2–3 недели",description:"Подготовка качественных требований в структурированном виде.",details:["Use Case, User Story, Job Story","Критерии приемки (Acceptance Criteria)","Definition of Ready / Definition of Done","Трассируемость и версионирование требований"],resources:["IEEE 29148 (обзор)","Atlassian: Writing requirements","Шаблоны спецификаций"]},
{id:4,title:"Моделирование процессов (BPMN)",icon:"🔄",time:"2–4 недели",description:"Моделирование бизнес- и системных процессов для согласования логики решения.",details:["BPMN 2.0: события, задачи, шлюзы","AS-IS и TO-BE модели","Декомпозиция процессов","Проверка моделей со стейкхолдерами"],resources:["BPMN 2.0 Specification","Camunda BPMN docs","Практикум в draw.io / Bizagi"]},
{id:5,title:"Моделирование данных и SQL",icon:"🗄️",time:"3–4 недели",description:"Проектирование и анализ структуры данных для информационных систем.",details:["ER-диаграммы и нормальные формы","Сущности, связи и ограничения","Базовые и аналитические SQL-запросы","Проверка корректности данных"],resources:["PostgreSQL Documentation","Vertabelo Data Modeling","SQLBolt"]},
{id:6,title:"Интеграции и API",icon:"🔌",time:"2–3 недели",description:"Описание интеграционного взаимодействия между системами.",details:["REST, SOAP, gRPC — когда что использовать","JSON/XML и контракт взаимодействия","OpenAPI / Swagger","Коды ошибок, идемпотентность, ретраи"],resources:["REST API Tutorial","OpenAPI Specification","Postman Learning Center"]},
{id:7,title:"UML и проектирование решения",icon:"📐",time:"2–3 недели",description:"Использование UML для формализации поведения и структуры системы.",details:["Диаграммы последовательности","Диаграммы классов и состояний","Контекстная диаграмма системы","Согласование архитектурных ограничений"],resources:["UML Distilled","PlantUML docs","C4 Model (обзор)"]},
{id:8,title:"Нефункциональные требования",icon:"🛡️",time:"2 недели",description:"Определение требований к качеству: производительность, безопасность, надежность.",details:["Performance, Security, Availability","SLA/SLO/SLI и критерии качества","Угрозы и базовое threat modeling","Регуляторные и комплаенс-требования"],resources:["OWASP ASVS (обзор)","Google SRE Workbook (главы по SLO)","ISO/IEC 25010"]},
{id:9,title:"Приемка и тестирование требований",icon:"✅",time:"2–3 недели",description:"Поддержка QA и участие в верификации требований.",details:["Testability требований","Тест-кейсы на основе Use Case/User Story","Трассировка: требование → тест","UAT и критерии приемки"],resources:["ISTQB Glossary","Atlassian Test Management","Практика в Jira/Xray"]},
{id:10,title:"Коммуникации и развитие карьеры",icon:"🚀",time:"постоянно",description:"Развитие переговорных навыков, лидерства и профессионального портфолио.",details:["Презентация решений для бизнеса и IT","Ведение демо и ретроспектив","Личный план развития аналитика","Портфолио артефактов: BPMN, UML, SRS"],resources:["Курсы по фасилитации","Книги по системному мышлению","Профсообщества аналитиков"]}
];

let currentStage = null;
let progress = {1:'completed',2:'completed',3:'completed',4:'completed'};
const STORAGE_KEY = 'systemAnalystRoadmapProgress';

function renderRoadmap(){
  const container=document.getElementById('roadmapStages'); container.innerHTML='';
  const statusText={pending:'Не начато','in-progress':'В процессе',completed:'Пройдено'};
  roadmapData.forEach((stage,idx)=>{
    const status=progress[stage.id]||'pending';
    const side=idx%2===0?'left':'right';
    const el=document.createElement('div');
    el.className=`stage ${side}`;
    el.id=`stage-${stage.id}`;
    el.innerHTML=`<div class="stage-content ${status}" onclick="openModal(${stage.id})">
      <div class="stage-number">${stage.id}</div>
      <div class="snake-link"></div>
      <span class="status-badge ${status}">${statusText[status]}</span>
      <div class="stage-icon">${stage.icon}</div>
      <div class="stage-title">${stage.title}</div>
      <div class="stage-time">${stage.time}</div>
      <div class="stage-desc">${stage.description}</div>
    </div>`;
    container.appendChild(el);
  });
  initScrollReveal();
  updateStats();
}
function initScrollReveal(){
  const cards=document.querySelectorAll('.stage-content');
  cards.forEach(card=>card.classList.add('reveal'));
  const observer=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  },{threshold:0.25, rootMargin:'0px 0px -10% 0px'});
  cards.forEach(card=>observer.observe(card));
}
function openModal(id){
  currentStage=roadmapData.find(s=>s.id===id); if(!currentStage)return;
  modalTitle.textContent=`${currentStage.icon} ${currentStage.title}`;
  modalDesc.textContent=currentStage.description;
  modalTime.textContent=currentStage.time;
  modalDetails.innerHTML=currentStage.details.map(d=>`<li>${d}</li>`).join('');
  modalResources.innerHTML=currentStage.resources.map(r=>`<li>${r}</li>`).join('');
  modal.style.display='flex';
}
function closeModal(){ modal.style.display='none'; currentStage=null; }
function setStatus(status){
  if(!currentStage) return;
  progress[currentStage.id]=status;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(progress));
  renderRoadmap(); closeModal();
}
function updateStats(){
  const total=roadmapData.length;
  const completed=Object.values(progress).filter(s=>s==='completed').length;
  const inProgress=Object.values(progress).filter(s=>s==='in-progress').length;
  const percent=Math.round(((completed+inProgress*0.5)/total)*100);
  totalSkills.textContent=total; completedCount.textContent=completed; progressCount.textContent=inProgress;
  progressFill.style.width=percent+'%'; progressFill.textContent=percent+'%';
  let level='Старт'; if(completed>=9)level='Эксперт'; else if(completed>=7)level='Уверенный'; else if(completed>=4)level='Практик'; else if(completed>=1)level='Начинающий';
  currentLevel.textContent=level;
}
function saveData(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(progress)); alert('✅ Прогресс сохранён'); }
function loadData(){
  const saved=localStorage.getItem(STORAGE_KEY);
  if(saved){ progress=JSON.parse(saved); renderRoadmap(); alert('✅ Прогресс загружен'); }
  else { alert('ℹ️ Сохранённых данных пока нет'); }
}
function resetData(){
  if(confirm('⚠️ Сбросить весь прогресс?')){ progress={1:'completed',2:'completed',3:'completed',4:'completed'}; localStorage.removeItem(STORAGE_KEY); renderRoadmap(); alert('🔄 Прогресс сброшен'); }
}
modal.addEventListener('click',function(e){ if(e.target===this) closeModal(); });
window.onload=()=>{ const saved=localStorage.getItem(STORAGE_KEY); if(saved) progress=JSON.parse(saved); renderRoadmap(); };
</script>
</body>
</html>
